    const usePSSounds = () => {
      const audioCtx = useRef(null);

      const playSound = useCallback((freq, type, duration, vol = 0.1) => {
        try {
          if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
          const ctx = audioCtx.current;
          if (ctx.state === 'suspended') ctx.resume();
          
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          
          gain.gain.setValueAtTime(vol, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) { /* Audio fails silently if blocked */ }
      }, []);

      return {
        nav: () => playSound(800, 'sine', 0.05, 0.05),
        confirm: () => {
          playSound(1200, 'sine', 0.1, 0.08);
          setTimeout(() => playSound(1600, 'sine', 0.1, 0.05), 50);
        },
        back: () => {
          playSound(1000, 'sine', 0.1, 0.08);
          setTimeout(() => playSound(800, 'sine', 0.1, 0.05), 50);
        },
        hover: () => playSound(440, 'triangle', 0.015, 0.02)
      };
    };

            const iconData = window.lucide.icons[iconName] || window.lucide.icons.helpCircle;
            if (iconData) {
              const svg = window.lucide.createSvg(iconData, {
                width: size,
                height: size,
                class: className,
                'stroke-width': 2,
                stroke: 'currentColor',
                fill: 'none'
              });
              containerRef.current.appendChild(svg);
            }
          }
        };
        if (window.lucide) render();
        else {
          const check = setInterval(() => { if (window.lucide) { render(); clearInterval(check); } }, 100);

        }
      }, [name, size, className]);

            document.body.removeChild(el);

            setStatus("✨ Prompt Generated & Copied! Launching AI Hub..."); 
            setTimeout(() => setLauncherOpen(true), 800);
          }
        } catch (error) { setStatus("Calibration failed."); } finally { setIsRefining(false); }
      };

      const copyOnly = () => {
        ps.confirm();
        const el = document.createElement('textarea');
        el.value = prompt;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setStatus("✨ Copied to Clipboard! Ready for AI Launcher.");
        setTimeout(() => setStatus(""), 4000);
      };

      const copyToLauncher = (url) => {
        ps.confirm();
        const el = document.createElement('textarea');
        el.value = prompt;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setStatus("Copied Metadata! Launching Engine...");
        setTimeout(() => window.open(url, '_blank'), 500);
      };

      const toggleLauncher = () => {
        if (!launcherOpen) ps.nav(); else ps.back();
        setLauncherOpen(!launcherOpen);
      };

      const runImageEdit = async () => {
        ps.confirm();
        if (!editImg1) { setStatus("Upload Image to Edit first!"); return; }
        if (!editPrompt) { setStatus("Enter modification prompt!"); return; }
        setIsEditing(true);
        setStatus("✨ AI Editor modifying image...");
        try {
          const parts = [
            { text: "INSTRUCTION: Modify the primary image based on this prompt: " + editPrompt },
            { inlineData: { mimeType: "image/png", data: editImg1 } }
          ];
          if (editImg2) {
            parts.push({ text: "Use this secondary image as additional reference/style/element:" });
            parts.push({ inlineData: { mimeType: "image/png", data: editImg2 } });
          }

          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
          const result = await fetchWithRetry(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: "user", parts }],
              generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
            })
          });

          const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
          if (base64) {
            const finalImg = `data:image/png;base64,${base64}`;
            setEditResult(finalImg);
            setStatus("✨ Image Edit Complete!");
            setTimeout(() => setStatus(""), 4000);
          } else {
            setStatus("Failed to generate image edit.");
          }
        } catch (err) {
          setStatus("Edit failed. Check connection.");
        } finally {
          setIsEditing(false);
        }
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30 overflow-x-hidden flex flex-col">
          <header className="border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 h-24 flex items-center shrink-0">
            <div className="max-w-6xl mx-auto px-4 w-full flex items-center justify-between">
              
              <div className="flex items-center gap-5 group">
                <div onMouseEnter={ps.hover} onClick={ps.confirm} className="relative transition-transform active:scale-95">
                  <ArchLogo />
                  <div className="absolute inset-0 bg-blue-500/20 blur-2xl rounded-full scale-0 group-hover:scale-110 transition-transform duration-700"></div>
                </div>
                <div>
                  <h1 className="text-2xl font-black tracking-tighter uppercase italic leading-none">JN <span className="text-blue-500 underline decoration-blue-500/30 underline-offset-8">prompter</span></h1>
                  <p className="text-[8px] uppercase tracking-[0.6em] text-slate-500 font-black mt-2">Neural Architecture Suite</p>
                </div>
              </div>

              <div className="flex items-center gap-4 no-print">
                <nav className="flex bg-slate-800/50 p-1.5 rounded-2xl border border-white/5 overflow-x-auto custom-scrollbar shadow-inner">
                  <button onClick={() => {ps.nav(); setActiveTab('generate');}} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === 'generate' ? 'bg-blue-600 text-white shadow-lg' : 'hover:text-white text-slate-500'}`}>Smart Prompt</button>
                  <button onClick={() => {ps.nav(); setActiveTab('edit');}} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === 'edit' ? 'bg-blue-600 text-white shadow-lg' : 'hover:text-white text-slate-500'}`}>Image Edit</button>
                </nav>

                <div className="relative">
                  <button onMouseEnter={ps.hover} onClick={toggleLauncher} className={`flex items-center gap-3 px-6 py-3 rounded-2xl bg-slate-800 border border-white/10 transition-all menu-glowing-hover launcher-glow ${launcherOpen ? 'ring-2 ring-blue-500 bg-slate-700' : ''}`}>
                    <Icon name="Activity" className="text-blue-400 w-4 h-4" />
                    <span className="text-[10px] font-black uppercase tracking-[0.3em] hidden md:inline">AI Launcher</span>
                    <Icon name={launcherOpen ? "ChevronUp" : "ChevronDown"} size={12} className="text-slate-500" />
                  </button>
                  {launcherOpen && (
                    <div className="absolute top-16 right-0 w-80 bg-slate-900 border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] overflow-hidden z-[60] animate-in fade-in zoom-in-95 duration-200">
                      <div className="p-4 border-b border-white/5 bg-slate-800/50 flex items-center justify-between">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">External Neural Engines</p>
                        <Icon name="ExternalLink" size={12} className="text-blue-500" />
                      </div>
                      <div className="max-h-[400px] overflow-y-auto custom-scrollbar p-3 space-y-1 bg-slate-950/50">
                        {AI_SERVICES.map((service, idx) => (
                          <button key={idx} onMouseEnter={ps.hover} onClick={() => copyToLauncher(service.url)} className="w-full text-left p-4 rounded-2xl launcher-item flex items-center gap-4 border border-transparent hover:border-white/5">
                            <div className={`p-2.5 rounded-xl bg-slate-900 shadow-inner ${service.color}`}><Icon name={service.icon} size={18} /></div>
                            <div><p className="text-xs font-black text-white uppercase tracking-tight">{service.name}</p><p className="text-[9px] text-slate-500 line-clamp-1">{service.desc}</p></div>
                          </button>
                        ))}
                      </div>
                      <div className="p-4 bg-blue-600/10 text-center border-t border-white/5">
                         <p className="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em]">Click to copy & fire engine</p>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 w-full flex-grow">
            {activeTab === 'generate' && (
              <div className="space-y-8 animate-in fade-in zoom-in-95 duration-300">
                <section className="bg-slate-900 border border-white/5 rounded-[2.5rem] p-10 shadow-2xl space-y-10">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="md:col-span-2">
                      <div className="flex items-center gap-3 mb-4">
                        <Icon name="PenTool" className="w-4 h-4 text-blue-400" />
                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] block">Design Subject</label>
                      </div>
                      <input onFocus={ps.nav} value={userSubject} onChange={(e) => setUserSubject(e.target.value)} className="w-full bg-slate-950 border border-white/10 rounded-[1.5rem] p-5 text-sm outline-none focus:border-blue-500 transition-all font-medium placeholder:text-slate-800 shadow-inner" placeholder="e.g. brutalist museum, sharp geometry..." />
                    </div>
                    <div>
                      <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-3">
                          <Icon name="Hash" className="w-4 h-4 text-blue-400" />
                          <label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] block">Seed</label>
                        </div>
                        <button onMouseEnter={ps.hover} onClick={() => { ps.confirm(); setSeed(Math.floor(Math.random() * 999999999).toString()); }} className="text-[9px] text-blue-500 hover:text-blue-400 uppercase font-black tracking-widest flex items-center gap-1 transition-colors">
                          <Icon name="RefreshCw" size={10} /> Random
                        </button>
                      </div>
                      <input onFocus={ps.nav} value={seed} onChange={(e) => setSeed(e.target.value)} className="w-full bg-slate-950 border border-white/10 rounded-[1.5rem] p-5 text-sm outline-none focus:border-blue-500 transition-all font-medium placeholder:text-slate-800 shadow-inner text-slate-300" placeholder="e.g. 123456789 (Optional)" />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div className="space-y-8">
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Style Engine</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeStyle} onChange={(e) => setActiveStyle(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(STYLES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Shot Angle</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeShot} onChange={(e) => setActiveShot(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(SHOT_TYPES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Visual Camera Effect</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeEffect} onChange={(e) => setActiveEffect(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(CAMERA_EFFECTS).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Regional Background</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeBackground} onChange={(e) => setActiveBackground(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(BACKGROUNDS).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Vegetation Layer</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeVeg} onChange={(e) => setActiveVegetation(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(VEGETATION).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Landscape Elements</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeLandscape} onChange={(e) => setActiveLandscape(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(LANDSCAPES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-8">
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Lighting Calibration</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeLight} onChange={(e) => setActiveLight(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(LIGHT_MODES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Lighting Fixtures</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeFixture} onChange={(e) => setActiveFixture(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(LIGHT_FIXTURES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Population Demo</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeCountry} onChange={(e) => setActiveCountry(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(COUNTRIES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Vehicle Preset</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeVehicle} onChange={(e) => setActiveVehicle(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(VEHICLES).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Civil Road Marking</label>
                        <select onMouseEnter={ps.hover} onClick={ps.nav} value={activeRoad} onChange={(e) => setActiveRoad(e.target.value)} className="w-full bg-slate-800 border border-white/5 rounded-2xl p-4 outline-none focus:border-blue-500 appearance-none cursor-pointer menu-glowing-hover">
                          {Object.entries(ROAD_MARKS).map(([k,v]) => <option key={k} value={k}>{v.name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-black text-slate-500 uppercase block mb-3 tracking-[0.2em]">Atmosphere Mode</label>
                        <div className="grid grid-cols-3 gap-2">
                           {Object.entries(SEASONS).map(([key, s]) => (
                             <button key={key} onMouseEnter={ps.hover} onClick={() => {ps.nav(); setActiveSeason(key)}} className={`p-3 rounded-xl text-[10px] font-black border transition-all truncate uppercase tracking-tighter ${activeSeason === key ? 'bg-blue-600 border-blue-500 text-white shadow-lg' : 'bg-slate-800 border-white/5 text-slate-500 hover:text-slate-300'}`}>
                               {s.name}
                             </button>
                           ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="pt-8 border-t border-white/5">
                    <div className="flex items-center gap-3 mb-6">
                       <Icon name="Box" className="w-4 h-4 text-blue-400" />
                       <label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] block">Geometric Capture</label>
                    </div>
                    <div className="relative overflow-hidden rounded-[2.5rem] border border-white/10 bg-slate-950 aspect-video group shadow-inner image-placeholder max-w-4xl mx-auto">
                      {!previewUrl ? (
                        <div onMouseEnter={ps.hover} onClick={() => {ps.confirm(); document.getElementById('upl').click()}} className="absolute inset-0 flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-blue-500/5 group/upload">
                          <Icon name="Upload" className="w-16 h-16 text-slate-800 mb-3 group-hover/upload:text-blue-500 transition-colors" />
                          <span className="text-[11px] text-slate-700 font-black uppercase tracking-[0.4em] group-hover/upload:text-blue-400 transition-colors">Import Viewport</span>
                        </div>
                      ) : (
                        <div className="relative w-full h-full">
                          <img src={previewUrl} className="w-full h-full object-contain" />
                          <button onMouseEnter={ps.hover} onClick={() => {ps.back(); setPreviewUrl(null); setSelectedImage(null);}} className="absolute top-6 right-6 p-4 bg-black/60 backdrop-blur-xl rounded-3xl hover:bg-red-600 transition-all shadow-2xl">
                             <Icon name="Trash2" className="w-5 h-5 text-white" />
                          </button>
                        </div>
                      )}
                      <input id="upl" type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                    </div>
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-5">
                    <div className="flex items-center gap-3"><Icon name="Terminal" className="w-4 h-4 text-blue-400" /><label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em]">Master Neural String</label></div>
                    <div className="flex items-center gap-3">
                      <button onMouseEnter={ps.hover} onClick={copyOnly} className="text-[10px] flex items-center gap-2 px-5 py-3 bg-indigo-600/10 text-indigo-400 rounded-2xl font-black uppercase tracking-widest transition-all hover:bg-indigo-600 hover:text-white hover:shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                        <Icon name="Copy" className="w-4 h-4" /> Copy
                      </button>
                      <button onMouseEnter={ps.hover} onClick={generatePrompt} disabled={isRefining || !selectedImage} className="text-[10px] flex items-center gap-3 px-6 py-3 bg-blue-600/10 text-blue-400 rounded-2xl disabled:opacity-30 font-black uppercase tracking-widest transition-all hover:bg-blue-600 hover:text-white hover:shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                        <Icon name="Zap" className="w-4 h-4" /> Generate Prompt
                      </button>
                    </div>
                  </div>
                  <textarea onMouseEnter={ps.hover} value={prompt} readOnly className="w-full h-48 bg-slate-950 border border-white/5 rounded-[2.5rem] p-10 text-sm font-mono text-blue-400 leading-relaxed shadow-inner outline-none resize-none" />
                </div>
              </section>
            </div>
            )}

            {activeTab === 'edit' && (
              <div className="animate-in fade-in zoom-in-95 duration-300">
                 <section className="bg-slate-900 border border-white/5 rounded-[2.5rem] p-10 shadow-2xl space-y-10">
                   <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                      
                      <div className="space-y-8">
                        <div>
                          <h2 className="text-2xl font-black italic uppercase text-white tracking-tighter mb-2">Image <span className="text-indigo-500">Edit</span></h2>
                          <p className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-6">Modify and combine references</p>
                        </div>
                        
                        <div>
                          <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] block mb-3">Primary Image to Edit</label>
                          <div className="relative overflow-hidden rounded-[1.5rem] border border-white/10 bg-slate-950 aspect-video group shadow-inner image-placeholder">
                            {!editUrl1 ? (
                              <div onMouseEnter={ps.hover} onClick={() => {ps.confirm(); document.getElementById('edit-up1').click()}} className="absolute inset-0 flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-indigo-500/5 group/upload">
                                <Icon name="Upload" className="w-12 h-12 text-slate-800 mb-3 group-hover/upload:text-indigo-500 transition-colors" />
                                <span className="text-[9px] text-slate-700 font-black uppercase tracking-[0.3em] group-hover/upload:text-indigo-400 transition-colors">Upload Base</span>
                              </div>
                            ) : (
                              <div className="relative w-full h-full">
                                <img src={editUrl1} className="w-full h-full object-contain" />
                                <button onMouseEnter={ps.hover} onClick={() => {ps.back(); setEditUrl1(null); setEditImg1(null);}} className="absolute top-4 right-4 p-3 bg-black/60 backdrop-blur-xl rounded-2xl hover:bg-red-600 transition-all shadow-2xl">
                                   <Icon name="Trash2" className="w-4 h-4 text-white" />
                                </button>
                              </div>
                            )}
                            <input id="edit-up1" type="file" className="hidden" accept="image/*" onChange={handleEditUpload1} />
                          </div>
                        </div>

                        <div>
                          <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] block mb-3">Secondary Image (Optional Element)</label>
                          <div className="relative overflow-hidden rounded-[1.5rem] border border-white/10 bg-slate-950 aspect-video group shadow-inner image-placeholder">
                            {!editUrl2 ? (
                              <div onMouseEnter={ps.hover} onClick={() => {ps.confirm(); document.getElementById('edit-up2').click()}} className="absolute inset-0 flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-emerald-500/5 group/upload">
                                <Icon name="ImagePlus" className="w-12 h-12 text-slate-800 mb-3 group-hover/upload:text-emerald-500 transition-colors" />
                                <span className="text-[9px] text-slate-700 font-black uppercase tracking-[0.3em] group-hover/upload:text-emerald-400 transition-colors">Upload Reference</span>
                              </div>
                            ) : (
                              <div className="relative w-full h-full">
                                <img src={editUrl2} className="w-full h-full object-contain" />
                                <button onMouseEnter={ps.hover} onClick={() => {ps.back(); setEditUrl2(null); setEditImg2(null);}} className="absolute top-4 right-4 p-3 bg-black/60 backdrop-blur-xl rounded-2xl hover:bg-red-600 transition-all shadow-2xl">
                                   <Icon name="Trash2" className="w-4 h-4 text-white" />
                                </button>
                              </div>
                            )}
                            <input id="edit-up2" type="file" className="hidden" accept="image/*" onChange={handleEditUpload2} />
                          </div>
                        </div>

                        <div>
                           <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] block mb-3">Modification Instructions</label>
                           <textarea onMouseEnter={ps.hover} value={editPrompt} onChange={(e) => setEditPrompt(e.target.value)} placeholder="e.g. Change the building facade to brick, add modern windows..." className="w-full h-32 bg-slate-950 border border-white/10 rounded-[1.5rem] p-5 text-sm outline-none focus:border-indigo-500 transition-all font-medium placeholder:text-slate-800 shadow-inner resize-none" />
                        </div>

                        <button 
                          onMouseEnter={ps.hover}
                          onClick={runImageEdit}
                          disabled={isEditing || !editImg1}
                          className="w-full text-[10px] flex items-center justify-center gap-3 px-6 py-5 bg-indigo-600/10 text-indigo-400 rounded-2xl disabled:opacity-30 font-black uppercase tracking-widest transition-all hover:bg-indigo-600 hover:text-white hover:shadow-[0_0_20px_rgba(79,70,229,0.3)]"
                        >
                          {isEditing ? <Icon name="RefreshCw" className="w-4 h-4 animate-spin" /> : <Icon name="Wand2" className="w-4 h-4" />}
                          {isEditing ? 'Processing Edit...' : 'Run Neural Edit'}
                        </button>
                      </div>

                      <div className="flex flex-col">
                         <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] block mb-3">Modified Output</label>
                         <div className="flex-grow rounded-[2rem] border-2 border-white/5 bg-slate-950 flex items-center justify-center overflow-hidden relative shadow-inner p-4 min-h-[400px]">
                            {editResult ? (
                              <div className="w-full h-full relative group">
                                <img src={editResult} className="w-full h-full object-contain rounded-xl" />
                                <button onMouseEnter={ps.hover} onClick={() => { const link = document.createElement('a'); link.href = editResult; link.download = `edit-${Date.now()}.png`; link.click(); }} className="absolute bottom-4 right-4 p-4 bg-indigo-600 rounded-2xl hover:bg-indigo-500 transition-all shadow-2xl opacity-0 group-hover:opacity-100">
                                   <Icon name="Download" className="w-5 h-5 text-white" />
                                </button>
                              </div>
                            ) : (
                              <div className="opacity-10 text-center select-none flex flex-col items-center">
                                <Icon name="Image" size={64} className="mb-4" />
                                <span className="text-[10px] font-black uppercase tracking-[0.4em]">Result Standby</span>
                              </div>
                            )}
                         </div>
                      </div>

                   </div>
                 </section>
              </div>
            )}

            {status && (
              <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600/90 backdrop-blur-md border border-blue-400/30 px-6 py-4 rounded-[2rem] flex items-center gap-4 animate-in fade-in slide-in-from-bottom-8 shadow-2xl z-50">
                <Icon name="Activity" className="w-5 h-5 text-white shrink-0" /><p className="text-[11px] text-white font-black uppercase tracking-[0.2em] italic">{String(status)}</p>
              </div>
            )}
          </main>

          <footer className="border-t border-white/5 py-12 mt-auto text-center opacity-30 shrink-0 no-print">
             <p className="text-[10px] uppercase tracking-[1em] font-black text-slate-600">JN prompter v4.3 // Neural Archi-Metadata // Developed by Jeck</p>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
